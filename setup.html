<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Portal - Create Your Account</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1976D2 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }
    .setup-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }
    .setup-header {
      background: linear-gradient(135deg, #1976D2 0%, #764ba2 100%);
      padding: 2rem;
      color: white;
      text-align: center;
    }
    .setup-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .setup-header p  { font-size: 13px; opacity: 0.85; line-height: 1.5; }
    .setup-body { padding: 1.75rem 2rem 2rem; }
    .setup-intro {
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      padding: 10px 14px;
      background: #f5f5f5;
      border-left: 3px solid #1976D2;
      border-radius: 0 4px 4px 0;
    }
    .form-group { margin-bottom: 14px; }
    .form-group:last-of-type { margin-bottom: 0; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #555;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      color: #212121;
    }
    input:focus {
      outline: none;
      border-color: #1976D2;
      box-shadow: 0 0 0 2px rgba(25,118,210,0.12);
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .strength-bar {
      height: 3px;
      border-radius: 2px;
      background: #eee;
      margin-top: 5px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0;
      transition: width 0.25s, background 0.25s;
    }
    .strength-label {
      font-size: 11px;
      color: #999;
      margin-top: 3px;
      min-height: 14px;
    }
    .message {
      padding: 9px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 14px;
      display: none;
    }
    .message.error   { background: #ffcdd2; color: #c62828; display: block; }
    .message.success { background: #c8e6c9; color: #2e7d32; display: block; }
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #1976D2;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.25rem;
      transition: background 0.2s;
    }
    .btn-primary:hover    { background: #1565c0; }
    .btn-primary:disabled { background: #bbb; cursor: default; }
    .form-hint {
      font-size: 11px;
      color: #999;
      margin-top: 3px;
    }
  </style>
</head>
<body>
  <div class="setup-container">
    <div class="setup-header">
      <h1>Welcome to Travel Planner</h1>
      <p>Create your personal account to get started.</p>
    </div>

    <div class="setup-body">
      <div class="setup-intro">
        Create your account to get started. You'll be logged in automatically once it's set up.
      </div>

      <div id="setupMessage" class="message"></div>

      <div class="form-group">
        <label>Username</label>
        <input type="text" id="newUsername" placeholder="e.g. your name" autocomplete="off"
               oninput="this.value = this.value.toLowerCase().replace(/[^a-z0-9_]/g, '')">
        <div class="form-hint">Letters, numbers and underscores only</div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="newPassword" placeholder="Min 6 characters"
                 autocomplete="new-password" oninput="checkStrength()">
          <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
          <div class="strength-label" id="strengthLabel"></div>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat password"
                 autocomplete="new-password">
        </div>
      </div>

      <button class="btn-primary" id="createBtn" onclick="createAccount()">
        Create Account &amp; Continue
      </button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth-manager.js"></script>

  <script>
    // Setup page is used for both first-run account creation AND self-registration
    // on additional devices. It is always accessible without a prior login.
    // If the user is already authenticated, send them straight to the app.
    if (window.AuthManager && window.AuthManager.isAuthenticated()) {
      window.location.href = 'index.html';
    }

    function checkStrength() {
      const pw    = document.getElementById('newPassword').value;
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (pw.length >= 6)  score++;
      if (pw.length >= 10) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      const levels = [
        { pct: '0%',   color: '#eee',    text: '' },
        { pct: '25%',  color: '#e53935', text: 'Weak' },
        { pct: '50%',  color: '#fb8c00', text: 'Fair' },
        { pct: '75%',  color: '#fdd835', text: 'Good' },
        { pct: '90%',  color: '#43a047', text: 'Strong' },
        { pct: '100%', color: '#1b5e20', text: 'Very strong' },
      ];
      const lvl = levels[Math.min(score, 5)];
      fill.style.width      = lvl.pct;
      fill.style.background = lvl.color;
      label.textContent     = lvl.text;
      label.style.color     = lvl.color;
    }

    async function createAccount() {
      const msgEl    = document.getElementById('setupMessage');
      const btn      = document.getElementById('createBtn');
      const username = document.getElementById('newUsername').value.trim();
      const password = document.getElementById('newPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;

      if (!username || username.length < 2) {
        showError('Username must be at least 2 characters.'); return;
      }
      if (username === 'admin' || username === 'demo') {
        showError('Choose a different username — "' + username + '" is a reserved built-in account.'); return;
      }
      if (!password || password.length < 6) {
        showError('Password must be at least 6 characters.'); return;
      }
      if (password !== confirm) {
        showError('Passwords do not match.'); return;
      }

      btn.disabled = true;
      msgEl.className   = 'message';
      msgEl.textContent = '';

      // ── Try the server-side API first (register = open self-registration) ───
      const { status, data } = await window.AuthManager.callUsersAPI('POST', {
        action: 'register', username, password
      });

      if (status === 200 && data.success) {
        // API success — mark setup complete locally and create a session.
        window.AuthManager.completeSetup();
        await window.AuthManager.authenticate(username, password, false);
        showSuccess();
        return;
      }

      if (status === 409) {
        showError(data.error || 'Username "' + username + '" is already taken — choose another.');
        btn.disabled = false;
        return;
      }

      if (status === 503 || status === 0) {
        showError('Server not reachable — make sure Vercel KV environment variables (KV_REST_API_URL, KV_REST_API_TOKEN, AUTH_SALT) are configured in your Vercel project dashboard, then redeploy.');
        btn.disabled = false;
        return;
      }

      showError(data.error || 'Server error — please try again.');
      btn.disabled = false;
    }

    function showSuccess() {
      const msgEl = document.getElementById('setupMessage');
      msgEl.className   = 'message success';
      msgEl.textContent = 'Account created! Taking you to the app…';
      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    }

    function showError(text) {
      const msgEl = document.getElementById('setupMessage');
      msgEl.className   = 'message error';
      msgEl.textContent = text;
    }
  </script>
</body>
</html>
