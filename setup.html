<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Portal - First Time Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1976D2 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
    }
    .setup-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }
    .setup-header {
      background: linear-gradient(135deg, #1976D2 0%, #764ba2 100%);
      padding: 2rem;
      color: white;
      text-align: center;
    }
    .setup-header h1 { font-size: 24px; margin-bottom: 6px; }
    .setup-header p { font-size: 13px; opacity: 0.85; line-height: 1.5; }
    .setup-body { padding: 2rem; }
    .step {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid #f0f0f0;
    }
    .step:last-of-type { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .step-label {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
    }
    .step-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #1976D2;
      color: white;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .step-title { font-size: 15px; font-weight: 600; color: #212121; }
    .step-subtitle { font-size: 12px; color: #777; margin-top: 1px; }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .form-group { margin-bottom: 12px; }
    .form-group:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #555;
      margin-bottom: 5px;
    }
    input {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
      color: #212121;
    }
    input:focus {
      outline: none;
      border-color: #1976D2;
      box-shadow: 0 0 0 2px rgba(25,118,210,0.12);
    }
    .optional-tag {
      font-size: 11px;
      font-weight: 400;
      color: #999;
      text-transform: none;
      letter-spacing: 0;
    }
    .message {
      padding: 9px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 12px;
      display: none;
    }
    .message.error   { background: #ffcdd2; color: #c62828; display: block; }
    .message.success { background: #c8e6c9; color: #2e7d32; display: block; }
    .message.info    { background: #bbdefb; color: #1565c0; display: block; }
    .btn-primary {
      width: 100%;
      padding: 12px;
      background: #1976D2;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 1.5rem;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #1565c0; }
    .btn-primary:disabled { background: #bbb; cursor: default; }
    .strength-bar {
      height: 4px;
      border-radius: 2px;
      background: #eee;
      margin-top: 6px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      width: 0;
      transition: width 0.3s, background 0.3s;
    }
    .strength-label {
      font-size: 11px;
      color: #999;
      margin-top: 3px;
    }
  </style>
</head>
<body>
  <div class="setup-container">
    <div class="setup-header">
      <h1>Welcome to Travel Planner</h1>
      <p>Let's secure your account before you get started.<br>This only takes a moment.</p>
    </div>

    <div class="setup-body">
      <div id="setupMessage" class="message"></div>

      <!-- Step 1: Change admin password (required) -->
      <div class="step">
        <div class="step-label">
          <div class="step-num">1</div>
          <div>
            <div class="step-title">Set your admin password</div>
            <div class="step-subtitle">Replace the default password — required to continue</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>New Password</label>
            <input type="password" id="newAdminPassword" placeholder="Min 8 characters" autocomplete="new-password" oninput="checkPasswordStrength()">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-label" id="strengthLabel"></div>
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmAdminPassword" placeholder="Repeat password" autocomplete="new-password">
          </div>
        </div>
      </div>

      <!-- Step 2: Create additional user (optional) -->
      <div class="step">
        <div class="step-label">
          <div class="step-num">2</div>
          <div>
            <div class="step-title">Create another user <span class="optional-tag">(optional)</span></div>
            <div class="step-subtitle">Add a second account now, or skip and do it later in Settings</div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="extraUsername" placeholder="e.g. sarah" autocomplete="off">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="extraPassword" placeholder="Min 6 characters" autocomplete="new-password">
          </div>
        </div>
      </div>

      <button class="btn-primary" id="finishBtn" onclick="completeSetup()">Finish Setup &amp; Enter App</button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth-manager.js"></script>

  <script>
    // Guard: must be authenticated to reach this page
    (function() {
      const authData = localStorage.getItem('travel-portal-auth') ||
                       sessionStorage.getItem('travel-portal-auth-session');
      if (!authData) {
        window.location.href = 'auth.html';
        return;
      }
      // If setup already complete, go straight to app
      if (window.AuthManager && window.AuthManager.isSetupComplete()) {
        window.location.href = 'index.html';
      }
    })();

    function checkPasswordStrength() {
      const pw = document.getElementById('newAdminPassword').value;
      const fill = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      let score = 0;
      if (pw.length >= 8)  score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;

      const levels = [
        { pct: '0%',   color: '#eee',    text: '' },
        { pct: '25%',  color: '#e53935', text: 'Weak' },
        { pct: '50%',  color: '#fb8c00', text: 'Fair' },
        { pct: '75%',  color: '#fdd835', text: 'Good' },
        { pct: '90%',  color: '#43a047', text: 'Strong' },
        { pct: '100%', color: '#1b5e20', text: 'Very strong' },
      ];
      const lvl = levels[Math.min(score, 5)];
      fill.style.width = lvl.pct;
      fill.style.background = lvl.color;
      label.textContent = lvl.text;
      label.style.color = lvl.color;
    }

    function completeSetup() {
      const msgEl = document.getElementById('setupMessage');
      const newPw  = document.getElementById('newAdminPassword').value;
      const confPw = document.getElementById('confirmAdminPassword').value;

      // Validate new admin password
      if (!newPw || newPw.length < 8) {
        msgEl.className = 'message error';
        msgEl.textContent = 'Admin password must be at least 8 characters.';
        return;
      }
      if (newPw === 'travel2027') {
        msgEl.className = 'message error';
        msgEl.textContent = 'Please choose a different password — don\'t keep the factory default.';
        return;
      }
      if (newPw !== confPw) {
        msgEl.className = 'message error';
        msgEl.textContent = 'Passwords do not match.';
        return;
      }

      // Validate optional extra user (only if either field is filled)
      const extraUser = document.getElementById('extraUsername').value.trim().toLowerCase();
      const extraPw   = document.getElementById('extraPassword').value;
      const hasExtra  = extraUser || extraPw;

      if (hasExtra) {
        if (!extraUser || extraUser.length < 2) {
          msgEl.className = 'message error';
          msgEl.textContent = 'Extra user: username must be at least 2 characters.';
          return;
        }
        if (!/^[a-z0-9_]+$/.test(extraUser)) {
          msgEl.className = 'message error';
          msgEl.textContent = 'Extra user: username can only contain letters, numbers, and underscores.';
          return;
        }
        if (extraUser === 'admin') {
          msgEl.className = 'message error';
          msgEl.textContent = 'Extra user: choose a different username — "admin" already exists.';
          return;
        }
        if (!extraPw || extraPw.length < 6) {
          msgEl.className = 'message error';
          msgEl.textContent = 'Extra user: password must be at least 6 characters.';
          return;
        }
      }

      // Apply changes
      const credentials = window.AuthManager.loadCredentials();

      // Update admin password in localStorage
      const adminCred = credentials.find(c => c.username === 'admin');
      if (adminCred) {
        adminCred.password = newPw;
      } else {
        credentials.push({ username: 'admin', password: newPw });
      }

      // Add extra user if provided
      if (hasExtra) {
        const exists = credentials.find(c => c.username === extraUser);
        if (!exists) {
          credentials.push({ username: extraUser, password: extraPw });
        }
      }

      window.AuthManager.saveCredentials(credentials);

      // Disable the demo account by default (admin is now customised, demo is unneeded)
      window.AuthManager.disableDefault('demo');

      window.AuthManager.completeSetup();

      msgEl.className = 'message success';
      msgEl.textContent = 'Setup complete! Taking you to the app…';
      document.getElementById('finishBtn').disabled = true;

      setTimeout(() => { window.location.href = 'index.html'; }, 800);
    }
  </script>
</body>
</html>
