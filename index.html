<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Planner</title>
  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/trip-planner.css">
  <link rel="stylesheet" href="styles/chat.css">
</head>
<body>
  <div id="app" class="planner-wrapper"></div>
  
  <script>
    (function() {
      const authData = localStorage.getItem('travel-portal-auth') ||
                       sessionStorage.getItem('travel-portal-auth-session');

      if (!authData) {
        window.location.href = 'auth.html';
        return;
      }

      try {
        const { timestamp } = JSON.parse(authData);
        const now = new Date().getTime();
        const SESSION_DURATION = 30 * 24 * 60 * 60 * 1000;

        if (now - timestamp > SESSION_DURATION) {
          localStorage.removeItem('travel-portal-auth');
          sessionStorage.removeItem('travel-portal-auth-session');
          window.location.href = 'auth.html';
          return;
        }

        // Require first-run setup to be complete before accessing the app
        if (localStorage.getItem('travel-portal-setup-complete') !== 'true') {
          window.location.href = 'setup.html';
        }
      } catch (e) {
        window.location.href = 'auth.html';
      }
    })();
  </script>
  
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth-manager.js"></script>
  <script src="js/trip-data.js"></script>
  <script src="js/ui-components.js"></script>
  <script src="js/trip-planner.js"></script>
  <script src="js/travel-agent-bot.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/faq.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
