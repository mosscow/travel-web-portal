name: Build MP3 Editor APK

on:
  push:
    branches: [ "claude/android-mp3-editor-app-nv6kz", "main" ]
    paths:
      - 'mp3-editor-app/**'
      - '.github/workflows/build-mp3-editor.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'mp3-editor-app/**'
      - '.github/workflows/build-mp3-editor.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mp3-editor-app/**/*.gradle*', 'mp3-editor-app/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x mp3-editor-app/gradlew

      - name: Build Debug APK
        id: build_debug
        working-directory: mp3-editor-app
        run: |
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tee /tmp/debug-build.log
          exit ${PIPESTATUS[0]}

      - name: Build Release APK (signed with debug key)
        id: build_release
        working-directory: mp3-editor-app
        run: |
          ./gradlew assembleRelease --no-daemon --info 2>&1 | tee /tmp/release-build.log
          exit ${PIPESTATUS[0]}

      - name: Report build failure
        if: failure()
        run: |
          LOG=""
          [ -f /tmp/debug-build.log ] && LOG="/tmp/debug-build.log"
          [ -f /tmp/release-build.log ] && LOG="${LOG} /tmp/release-build.log"
          echo "### Build Failure" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep -hiE "(error:|e: |FAILURE:|BUILD FAILED|Could not resolve|> Task|Caused by:|Unresolved reference|No such property|Unresolved:)" $LOG 2>/dev/null | head -80 >> "$GITHUB_STEP_SUMMARY" || echo "No matching error lines found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "--- Full tail of build log (last 200 lines) ---"
          cat $LOG 2>/dev/null | tail -200

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            /tmp/debug-build.log
            /tmp/release-build.log
          retention-days: 7

      - name: Post PR comment with failure
        if: failure() && github.event_name == 'pull_request'
        run: |
          {
            echo "### CI Build Failure (run #${{ github.run_number }})"
            echo '```'
            grep -hE "^(e:|error:|FAILURE:|BUILD FAILED|> What|> Caused)" \
              /tmp/debug-build.log /tmp/release-build.log 2>/dev/null | head -60 \
              || echo "Build failed — see: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo '```'
          } > /tmp/pr-body.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/pr-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MP3-Editor-debug
          path: mp3-editor-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: MP3-Editor-release
          path: mp3-editor-app/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create Release (on push to main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "MP3 Editor v${{ github.run_number }}"
          body: "Android MP3 Editor APK - auto-built from commit ${{ github.sha }}"
          files: |
            mp3-editor-app/app/build/outputs/apk/debug/app-debug.apk
            mp3-editor-app/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
