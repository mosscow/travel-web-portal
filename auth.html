<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Portal - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1976D2 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-container {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #212121;
      text-align: center;
    }
    .form-group { margin-bottom: 1rem; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #212121;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
    }
    input:focus {
      outline: none;
      border-color: #1976D2;
      box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.1);
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 14px;
    }
    input[type="checkbox"] { width: auto; margin-right: 8px; }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: #1976D2;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-login:hover    { background: #1565c0; }
    .btn-login:disabled { background: #bbb; cursor: default; }
    .btn-register {
      width: 100%;
      padding: 11px;
      background: transparent;
      color: #1976D2;
      border: 1.5px solid #1976D2;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s, color 0.2s;
      text-decoration: none;
      display: block;
      text-align: center;
    }
    .btn-register:hover { background: #e3f0fb; }
    .message {
      margin-top: 1rem;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    .message.error   { background: #ffcdd2; color: #c62828; display: block; }
    .message.success { background: #c8e6c9; color: #2e7d32; display: block; }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.25rem 0 0.5rem;
      color: #bbb;
      font-size: 11px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eee;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Travel Planner</h1>

    <form id="loginForm" style="margin-top:1.5rem;">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <div class="checkbox-group">
        <input type="checkbox" id="rememberMe">
        <label for="rememberMe" style="margin:0;font-weight:400;">Remember me for 30 days</label>
      </div>

      <button type="submit" class="btn-login" id="loginBtn">Sign In</button>
      <div id="message" class="message"></div>
    </form>

    <div class="divider">or</div>
    <a href="setup.html" class="btn-register">Create Account</a>
  </div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth-manager.js"></script>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      const username   = document.getElementById('username').value.trim();
      const password   = document.getElementById('password').value;
      const rememberMe = document.getElementById('rememberMe').checked;
      const messageEl  = document.getElementById('message');
      const loginBtn   = document.getElementById('loginBtn');

      loginBtn.disabled  = true;
      messageEl.textContent = 'Signing in…';
      messageEl.className  = 'message success';

      const result = await window.AuthManager.authenticate(username, password, rememberMe);

      if (result.success) {
        messageEl.textContent = 'Login successful! Redirecting…';
        messageEl.className  = 'message success';
        setTimeout(() => { window.location.href = 'index.html'; }, 500);
      } else {
        messageEl.textContent = 'Invalid username or password';
        messageEl.className  = 'message error';
        document.getElementById('password').value = '';
        loginBtn.disabled = false;
      }
    });

    // Show notice when redirected back from setup.html
    if (new URLSearchParams(window.location.search).get('setup') === 'done') {
      const msgEl = document.getElementById('message');
      msgEl.textContent = 'Account created! Sign in with your new credentials.';
      msgEl.className   = 'message success';
    }

    // If already authenticated, skip straight to the app
    if (window.AuthManager && window.AuthManager.isAuthenticated()) {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
